version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: delivery_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-delivery_db}
      POSTGRES_USER: ${POSTGRES_USER:-delivery_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-delivery_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-delivery_user} -d ${POSTGRES_DB:-delivery_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - delivery_net

  redis:
    image: redis:7-alpine
    container_name: delivery_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - delivery_net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery_web
    restart: unless-stopped
    command: >
      sh -c "mkdir -p /app/logs /app/backups &&
             python manage.py makemigrations --no-input &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py setup_initial_data &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - ./media:/app/media
      - logs_volume:/app/logs
      - ./backups:/app/backups
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - delivery_net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery_scheduler
    restart: unless-stopped
    command: python manage.py run_scheduler
    volumes:
      - .:/app
      - ./backups:/app/backups
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - delivery_net

  nginx:
    image: nginx:alpine
    container_name: delivery_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - web
    networks:
      - delivery_net

volumes:
  postgres_data:
  static_volume:
  logs_volume:

networks:
  delivery_net:
    driver: bridge
